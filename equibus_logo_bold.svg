<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
 <defs>
 <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
 <stop offset="0%" stop-color="#0B2A66"/>
 <stop offset="100%" stop-color="#2F80ED"/>
 </linearGradient>
 </defs>

 <!-- Icon: bold gear + arrow -->
 <g transform="translate(40,50)">
 <circle cx="80" cy="80" r="60" fill="none" stroke="url(#grad)" stroke-width="18"/>

 <!-- gear teeth -->
 <rect x="72" y="-5" width="16" height="40" fill="#2F80ED"/>
 <rect x="72" y="125" width="16" height="40" fill="#2F80ED"/>
 <rect x="-5" y="72" width="40" height="16" fill="#2F80ED"/>
 <rect x="125" y="72" width="40" height="16" fill="#2F80ED"/>

 <!-- arrow -->
 <polygon points="40,90 120,90 120,65 170,100 120,135 120,110 40,110"
 fill="url(#grad)"/>
 </g>

 <!-- Company Name (bolder) -->
 <text x="220" y="150"
 font-family="Arial Black, Helvetica, sans-serif"
 font-size="72"
 font-weight="900"
 fill="#0B2A66"
 letter-spacing="3">
 ЭКВИБУС
 </text>

 <!-- Tagline simplified -->
 <text x="220" y="210"
 font-family="Arial Black, Helvetica, sans-serif"
 font-size="26"
 font-weight="700"
 fill="#2F80ED"
 letter-spacing="4">
 НАДЁЖНОСТЬ
 </text>
</svg>